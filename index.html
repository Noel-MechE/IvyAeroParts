<!doctype html>
<html>
  <head>
    <title>IvyAeroParts | Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <img src="https://static.vecteezy.com/system/resources/previews/054/302/436/large_2x/adorable-black-silhouette-of-smilodon-head-vector.jpg" alt="IvyAeroParts Logo" class="logo" />
      <div class="header-content">
        <h1 class="title">IvyAeroParts</h1>
      </div>
      <div class="header-controls">
        <input type="text" id="searchInput" placeholder="Search by Part Name or Number" />
        <select id="categoryFilter">
          <option value="all">All Categories</option>
          <option value="Hardware">Hardware</option>
          <option value="Avionics">Avionics</option>
          <option value="Fluids">Fluids</option>
        </select>
      </div>
    </header>

    <div id="card-container"></div>

    <div class="card" style="display: none">
  <img src="" alt="Part Image" />
  <div class="card-content">
    <h2>Part Name</h2>
    <p><strong>Category:</strong> <span class="category"></span></p>
    <p><strong>Price:</strong> $<span class="price"></span></p>
    <p><strong>Part Number:</strong> <span class="partNumber"></span></p>
    <p><strong>Spec:</strong> <span class="spec"></span></p>
  </div>
</div>

    <div class="footer">
      <button onclick="quoteAlert()">Request Quote</button>
      <button onclick="removeLastCard()">Remove Part</button>
      <p> Contact Information:  <br>1113017@lbcc.edu <br> 323-675-4059 </p>
      <p>Location: <br>308 Negra Arroyo Lane, Albuquerque, New Mexico 87104</p>
      <p> Business Hours: <br>Monday - Friday <br> 9 am - 5 pm Daily </p>
    
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
